<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qwen3 Architecture Visualizer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #e0e0e0; display: flex; flex-direction: column; height: 100vh; }
#toolbar { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: #16213e; border-bottom: 1px solid #0f3460; flex-shrink: 0; }
#toolbar select { background: #1a1a2e; color: #e0e0e0; border: 1px solid #0f3460; border-radius: 4px; padding: 4px 8px; font-size: 14px; }
#breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 14px; }
#breadcrumb span.link { cursor: pointer; color: #64b5f6; }
#breadcrumb span.link:hover { text-decoration: underline; }
#breadcrumb span.cur { color: #e0e0e0; }
#breadcrumb span.sep { color: #666; }
#svg-container { flex: 1; overflow: auto; min-height: 200px; }
svg { display: block; margin: 0 auto; }
.block { cursor: pointer; transition: filter 0.15s; }
.block:hover { filter: brightness(1.35); }
#tooltip { position: fixed; pointer-events: none; background: #2d2d44; border: 1px solid #555; border-radius: 6px; padding: 6px 10px; font-size: 13px; line-height: 1.5; display: none; z-index: 1000; white-space: nowrap; }
#tooltip .tt-in  { color: #66bb6a; }
#tooltip .tt-out { color: #ffa726; }
#error-msg { color: #ef5350; font-size: 14px; padding: 20px; }
</style>
</head>
<body>

<div id="toolbar">
  <select id="model-select">
    <option value="4b">Qwen3-4B</option>
    <option value="8b">Qwen3-8B</option>
  </select>
  <div id="breadcrumb"><span class="cur">Model</span></div>
</div>

<div id="svg-container"><div id="error-msg"></div><svg id="main-svg"></svg></div>

<div id="tooltip">
  <div class="tt-in">input: <span id="tt-in"></span></div>
  <div class="tt-out">output: <span id="tt-out"></span></div>
</div>

<script src="{{ url_for('static', filename='visualizer.js') }}"></script>
</body>
</html>
